name: Daily Bible Verse Short

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Fetch fonts (Telugu + English)
        run: |
          mkdir -p assets/fonts
          curl -fsSL -o assets/fonts/NotoSansTelugu-Bold.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/notosanstelugu/NotoSansTelugu%5Bwdth%2Cwght%5D.ttf" || true
          curl -fsSL -o assets/fonts/NotoSansTelugu-Regular.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/notosanstelugu/NotoSansTelugu%5Bwdth%2Cwght%5D.ttf" || true
          curl -fsSL -o assets/fonts/Poppins-SemiBold.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/poppins/Poppins-SemiBold.ttf" || true
          curl -fsSL -o assets/fonts/Poppins-Regular.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/poppins/Poppins-Regular.ttf" || true
          ls -la assets/fonts

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate today's video
        run: python3 scripts/generate_video.py

      - name: Upload to YouTube
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python3 scripts/upload_youtube.py

      - name: Save rendered video as a workflow artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ github.run_id }}
          path: output/*.mp4
          retention-days: 14

      - name: Commit updated verse queue
        if: success()
        run: |
          git config user.name "bible-shorts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add verses.json
          git diff --cached --quiet || git commit -m "Mark today's verse as used [skip ci]"
          git push
